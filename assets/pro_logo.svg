<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="proBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- mark: sorted top-K probabilities; adaptive K cuts off the low-confidence tail -->
  <g transform="translate(40,40)">
    <line x1="-6" y1="120" x2="152" y2="120" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>

    <!-- kept top-K probabilities -->
    <rect x="0"  y="10" width="16" height="110" rx="5" fill="url(#proBar)"/>
    <rect x="22" y="42" width="16" height="78"  rx="5" fill="url(#proBar)" opacity="0.9"/>
    <rect x="44" y="68" width="16" height="52"  rx="5" fill="url(#proBar)" opacity="0.8"/>
    <rect x="66" y="84" width="16" height="36"  rx="5" fill="url(#proBar)" opacity="0.7"/>

    <!-- filtered-out low-confidence tail -->
    <rect x="88"  y="98"  width="16" height="22" rx="5" fill="#cbd5e1" opacity="0.6"/>
    <rect x="110" y="106" width="16" height="14" rx="5" fill="#cbd5e1" opacity="0.6"/>
    <rect x="132" y="111" width="16" height="9"  rx="5" fill="#cbd5e1" opacity="0.6"/>

    <!-- predictive-entropy curve approximated from the probabilities -->
    <path d="M8,12 C22,28 34,58 74,84 C96,98 116,107 140,112"
          fill="none" stroke="#0f172a" stroke-width="3.5"
          stroke-linecap="round" stroke-dasharray="2 9" opacity="0.5"/>

    <!-- adaptive-K cutoff -->
    <line x1="85" y1="-4" x2="85" y2="124" stroke="#0f172a" stroke-width="2.5"
          stroke-dasharray="4 5" opacity="0.65"/>
    <circle cx="85" cy="2" r="6.5" fill="#0f172a"/>
    <circle cx="85" cy="2" r="2.5" fill="#fbbf24"/>
  </g>

  <!-- wordmark -->
  <text x="212" y="118" font-size="78" font-weight="800" fill="#1e293b" letter-spacing="2">PRO</text>
  <text x="214" y="150" font-size="16.5" font-weight="600" fill="#ea580c" letter-spacing="0.5">Probabilities Are All You Need</text>
  <text x="214" y="172" font-size="13.5" font-weight="500" fill="#64748b" letter-spacing="1.5">TOP-K PROBABILITY ENTROPY</text>
</svg>
